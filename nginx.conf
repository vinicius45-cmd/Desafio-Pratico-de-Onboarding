server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Crucial para Single Page Applications (SPA) com React Router:
        # Tenta servir o arquivo correspondente, se não encontrar, redireciona ao index.html
        try_files $uri $uri/ /index.html;
    }

    # Configuração de Cache agressivo para assets estáticos (melhora a velocidade de carregamento)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf|webp|map)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }

    # Redirecionamento de páginas de erro do servidor
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
